version: '3.8'

services:
  # ── DATABASE ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: medichain-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - medichain-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ── CACHE ───────────────────────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: medichain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medichain-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── NODE.JS BACKEND API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medichain-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/medichain
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai:5001
    networks:
      - medichain-net

  # ── PYTHON AI MICROSERVICE ──────────────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: medichain-ai
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./ai/.env
    environment:
      - HOST=0.0.0.0
      - PORT=5001
    networks:
      - medichain-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # ── REACT FRONTEND (NGINX) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: medichain-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - medichain-net

volumes:
  mongodb_data:
  redis_data:

networks:
  medichain-net:
    driver: bridge
